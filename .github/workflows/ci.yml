name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC (security + perf baseline)
  workflow_dispatch:

jobs:

  # ── 1. Static analysis ──────────────────────────────────────────────────────
  static-analysis:
    name: Static analysis (lint + types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - name: Backend format check
        run: cd backend && uv run ruff format --check .

      - name: Backend lint
        run: cd backend && uv run ruff check .

      - name: Backend type check
        run: cd backend && uv run mypy .

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Frontend format check
        run: cd frontend && npx prettier --check .

      - name: Frontend lint
        run: cd frontend && npx eslint src

      - name: Frontend type check
        run: cd frontend && npx tsc --noEmit

  # ── 2. Frontend build ───────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Build
        run: cd frontend && npx vite build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  # ── 3. Backend unit + integration tests ─────────────────────────────────────
  backend-unit-tests:
    name: Backend unit tests (pytest)
    needs: [static-analysis, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - name: Run pytest with coverage
        run: cd backend && uv run pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── 4. Playwright E2E (browser acceptance) ──────────────────────────────────
  e2e-browser:
    name: E2E browser tests (Playwright)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(cd frontend && node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps

      - name: Run Playwright tests
        run: cd frontend && npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ── 5. Java Web acceptance tests (Serenity BDD + Cucumber + Selenium) ───────
  java-web-acceptance:
    name: Java acceptance tests — Web channel (Serenity/Cucumber/Selenium)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('java-automation/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Seed database and start services
        run: |
          cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          cd frontend && npx vite preview --host 0.0.0.0 --port 3001 &
          sleep 5
          cd backend && uv run python -m app.seed

      - name: Run Serenity/Cucumber tests (Web channel, headless)
        run: cd java-automation && ./gradlew test -Dchannel=Web

      - name: Upload Serenity Web report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serenity-web-report
          path: java-automation/target/site/serenity/

  # ── 6. Java API acceptance tests (REST Assured) ─────────────────────────────
  java-api-acceptance:
    name: Java acceptance tests — API channel (REST Assured)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('java-automation/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - name: Seed database and start backend
        run: |
          cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          cd backend && uv run python -m app.seed

      - name: Run Serenity/Cucumber tests (API channel)
        run: |
          cd java-automation && ./gradlew test \
            -Dchannel=API \
            -Dcucumber.filter.tags="@api and not @wip"

      - name: Upload Serenity API report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serenity-api-report
          path: java-automation/target/site/serenity/

  # ── 7. Java Web acceptance tests — Playwright browser adapter ────────────────
  java-web-acceptance-playwright:
    name: Java acceptance tests — Web channel (Serenity/Cucumber/Playwright)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('java-automation/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Install Playwright browsers and system deps
        run: npx --yes playwright install --with-deps chromium

      - name: Seed database and start services
        run: |
          cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          cd frontend && npx vite preview --host 0.0.0.0 --port 3001 &
          sleep 5
          cd backend && uv run python -m app.seed

      - name: Run Serenity/Cucumber tests (Web channel, Playwright)
        run: cd java-automation && ./gradlew test -Dchannel=Web -Dbrowser.impl=playwright

      - name: Upload Serenity Web/Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serenity-web-playwright-report
          path: java-automation/target/site/serenity/

  # ── 8. Java API acceptance tests — OkHttp adapter ────────────────────────────
  java-api-acceptance-okhttp:
    name: Java acceptance tests — API channel (OkHttp)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('java-automation/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - name: Seed database and start backend
        run: |
          cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          cd backend && uv run python -m app.seed

      - name: Run Serenity/Cucumber tests (API channel, OkHttp)
        run: |
          cd java-automation && ./gradlew test \
            -Dchannel=API \
            -Dhttp.impl=okhttp \
            -Dcucumber.filter.tags="@api and not @wip"

      - name: Upload Serenity API/OkHttp report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serenity-api-okhttp-report
          path: java-automation/target/site/serenity/

  # ── 9. Playwright E2E — WireMock frontend isolation ──────────────────────────
  e2e-browser-wiremock:
    name: E2E browser tests — WireMock frontend isolation (Playwright)
    needs: [static-analysis, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(cd frontend && node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps

      - name: Download WireMock standalone JAR
        run: |
          mkdir -p wiremock
          curl -L -o wiremock/wiremock-standalone.jar \
            https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/3.13.0/wiremock-standalone-3.13.0.jar

      - name: Run Playwright tests (WireMock backend stub)
        run: cd frontend && npx playwright test
        env:
          CI: true
          WIREMOCK: "true"

      - name: Upload Playwright/WireMock report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-wiremock-report
          path: frontend/playwright-report/

  # ── 10. Java Web acceptance — WireMock frontend isolation ────────────────────
  java-web-acceptance-wiremock:
    name: Java acceptance tests — Web channel (WireMock frontend isolation)
    needs: [static-analysis, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('java-automation/gradle/wrapper/gradle-wrapper.properties') }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Download WireMock standalone JAR
        run: |
          mkdir -p wiremock
          curl -L -o wiremock/wiremock-standalone.jar \
            https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/3.13.0/wiremock-standalone-3.13.0.jar

      - name: Start WireMock and frontend
        run: |
          java -jar wiremock/wiremock-standalone.jar \
            --port 8001 --root-dir wiremock --no-request-journal &
          cd frontend && npx vite preview --host 0.0.0.0 --port 3001 &
          sleep 5

      - name: Run Serenity/Cucumber tests (Web channel, WireMock stub)
        run: cd java-automation && ./gradlew test -Dchannel=Web

      - name: Upload Serenity Web/WireMock report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: serenity-web-wiremock-report
          path: java-automation/target/site/serenity/

  # ── 11. Security scanning ─────────────────────────────────────────────────────
  security-scan:
    name: Security scan (pip-audit + npm audit + OWASP)
    needs:
      - e2e-browser
      - java-web-acceptance
      - java-api-acceptance
      - java-web-acceptance-playwright
      - java-api-acceptance-okhttp
      - e2e-browser-wiremock
      - java-web-acceptance-wiremock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps
        run: cd backend && uv sync --locked

      - name: Python dependency audit (pip-audit)
        run: cd backend && uv run pip-audit
        continue-on-error: true

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Node dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: OWASP Dependency-Check (Java/Gradle)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: linea-supply-java
          path: java-automation
          format: HTML
          args: --failOnCVSS 7 --enableRetired
          out: reports

      - name: Upload OWASP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-check-report
          path: reports/

  # ── 8. Performance — k6 (smoke + load) ──────────────────────────────────────
  performance-k6:
    name: Performance tests — k6
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          prune-cache: false

      - run: uv python install

      - name: Install backend deps and start
        run: |
          cd backend && uv sync --locked
          uv run --project backend uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          uv run --project backend python -m app.seed

      - uses: grafana/setup-k6-action@v1

      - name: k6 smoke test
        run: k6 run --out json=performance/k6/results.json performance/k6/smoke.js

      - name: k6 load test
        run: k6 run --out json=performance/k6/load-results.json performance/k6/load.js

      - name: Upload k6 results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-results
          path: performance/k6/*.json
